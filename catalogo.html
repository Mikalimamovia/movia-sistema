<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — movia.</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  html, body { margin: 0; background: #ffffff; }
  #root:empty::before {
    content: 'Carregando catálogo...';
    color: #666; font-family: monospace; font-size: 12px; display: block; padding: 24px;
  }
  ::view-transition-old(active-photo), ::view-transition-new(active-photo) {
    animation-duration: 0.45s;
    animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
  }
  ::view-transition-old(root), ::view-transition-new(root) {
    animation-duration: 0.3s;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener('error', function (e) {
    var root = document.getElementById('root');
    root.innerHTML = '<div style="color:#fff;background:#000;font-family:monospace;padding:24px;white-space:pre-wrap;">'
      + '⚠ Erro ao carregar o catálogo:\n\n' + (e.message || e)
      + '\n\nVerifique sua conexão com a internet e tente recarregar a página.'
      + '</div>';
  });
</script>

function formatBRL(v) {
  const n = Number(v) || 0;
  return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function Fonts() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

      .f-display { font-family: 'Poppins', sans-serif; }
      .f-body { font-family: 'Inter', sans-serif; }
      .f-mono { font-family: 'JetBrains Mono', monospace; }
      .eyebrow { font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.16em; font-size: 11px; color: #6b6b66; }

      .fw-input {
        background: transparent; border: 1px solid rgb(210 210 205); color: rgb(15 15 13);
        padding: 10px 12px; font-size: 14px; outline: none; width: 100%; font-family: 'Inter', sans-serif;
      }
      .fw-input:focus { border-color: rgb(15 15 13); }
      .fw-input option { color: #111111; background: #ffffff; }

      .search-input {
        background: transparent; border: 1px solid rgb(210 210 205); color: rgb(15 15 13);
        padding: 10px 16px; font-size: 13px; outline: none; border-radius: 999px; font-family: 'Inter', sans-serif;
      }
      .search-input::placeholder { color: rgb(150 150 145); }
      .search-input:focus { border-color: rgb(15 15 13); }

      .pill {
        font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
        padding: 8px 16px; border-radius: 999px; border: 1px solid rgb(210 210 205); color: rgb(90 90 85);
        background: transparent; transition: border-color 0.15s ease, color 0.15s ease;
        white-space: nowrap;
      }
      .pill.selected { background: rgb(15 15 13); color: rgb(255 255 255); border-color: rgb(15 15 13); font-weight: 600; }
      .pill:hover:not(.selected) { border-color: rgb(140 140 135); color: rgb(40 40 38); }

      .btn-primary {
        background: rgb(15 15 13); color: rgb(255 255 255); font-weight: 600; font-size: 12px;
        letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 18px;
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        transition: background 0.2s ease;
      }
      .btn-primary:hover:not(:disabled) { background: rgb(60 60 56); }
      .btn-primary:disabled { opacity: 0.35; }

      .size-pill {
        font-family: 'Inter', sans-serif; font-size: 11.5px; font-weight: 500;
        padding: 5px 11px; border-radius: 999px; border: 1px solid rgb(210 210 205); color: rgb(90 90 85);
        background: transparent; transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
      }
      .size-pill.selected { background: rgb(15 15 13); color: rgb(255 255 255); border-color: rgb(15 15 13); }
      .size-pill:hover:not(.selected) { border-color: rgb(140 140 135); }

      @media (prefers-reduced-motion: no-preference) {
        .look-card { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .look-photo img { transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1); }
        .look-card:hover .look-photo img { transform: scale(1.035); }
        .cart-drawer { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
      }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
      @media (prefers-reduced-motion: no-preference) {
        .welcome-card { animation: welcomeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
      }
      @keyframes welcomeIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

      @media (prefers-reduced-motion: no-preference) {
        .brand-fade { animation: brandFade 8s ease-in-out infinite; }
        .slogan-fade { animation: sloganFade 8s ease-in-out infinite; }
      }
      @media (prefers-reduced-motion: reduce) {
        .brand-fade { opacity: 1; }
        .slogan-fade { opacity: 0; display: none; }
      }
      @keyframes brandFade {
        0% { opacity: 1; }
        37.5% { opacity: 1; }
        50% { opacity: 0; }
        87.5% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes sloganFade {
        0% { opacity: 0; }
        37.5% { opacity: 0; }
        50% { opacity: 1; }
        87.5% { opacity: 1; }
        100% { opacity: 0; }
      }
    `}</style>
  );
}

    <div
      className="fixed inset-0 z-50 flex items-center justify-center px-5"
      style={{ backgroundColor: 'rgba(0,0,0,0.82)', backdropFilter: 'blur(3px)' }}
      onClick={onClose}
    >
      <div
        className="relative w-full max-w-sm welcome-card"
        style={{ backgroundColor: '#ffffff', border: '1px solid #e5e3dc' }}
        onClick={(e) => e.stopPropagation()}
      >
        <button
          onClick={onClose}
          aria-label="Fechar"
          className="absolute top-4 right-4 text-neutral-500 hover:text-black text-xl leading-none transition-colors"
        >✕</button>
        <div className="px-8 pt-10 pb-9 text-center">
          <img src={LOGO_DATA_URI} alt={storeName || 'movia.'} className="h-7 w-auto mx-auto mb-8" />
          <h2 className="f-display font-extrabold leading-tight" style={{ fontSize: '26px', color: 'rgb(15 15 13)' }}>
            Olá, musa!
          </h2>
          <p className="f-body text-[14px] text-neutral-600 leading-relaxed mt-4">
            Aproveite nosso catálogo com a nossa última coleção — peças pensadas pra inspirar cada movimento seu, dentro e fora do treino.
          </p>
          <button onClick={onClose} className="btn-primary w-full mt-8">
            Ver catálogo
          </button>
        </div>
      </div>

}

function Lightbox({ photos, index, onClose, onNav }) {
  if (index === null || index === undefined) return null;
  return (
    <div
      className="fixed inset-0 bg-black/96 z-50 flex items-center justify-center px-4"
      style={{ backdropFilter: 'blur(2px)' }}
      onClick={onClose}
    >
      <button onClick={onClose} className="absolute top-6 right-6 text-white/70 hover:text-white text-2xl leading-none transition-colors">✕</button>
      {photos.length > 1 && (
        <button
          onClick={(e) => { e.stopPropagation(); onNav(-1); }}
          className="absolute left-3 sm:left-8 text-white/50 hover:text-white text-4xl px-2 transition-colors"
        >‹</button>
      )}
      <img
        src={photos[index]}
        alt=""
        onClick={(e) => e.stopPropagation()}
        className="max-h-[85vh] max-w-full object-contain"
        style={{ viewTransitionName: 'active-photo' }}
      />
      {photos.length > 1 && (
        <button
          onClick={(e) => { e.stopPropagation(); onNav(1); }}
          className="absolute right-3 sm:right-8 text-white/50 hover:text-white text-4xl px-2 transition-colors"
        >›</button>
      )}
    </div>
  );
}

function LookCard({ product, onAddToCart, onOpenLightbox, activeSourceKey }) {
  const photos = product.photos || [];
  const variants = product.variants || [];
  const allOutOfStock = variants.length > 0 && variants.every(v => !v.inStock);
  const availableColors = [...new Set(variants.filter(v => v.inStock).map(v => v.color))];
  const [selectedColor, setSelectedColor] = useState(availableColors[0] || null);
  const [selectedSize, setSelectedSize] = useState(null);
  const [qty, setQty] = useState(1);

  const sizesForColor = variants.filter(v => v.color === selectedColor && v.inStock);
  const canAdd = selectedColor && selectedSize && !allOutOfStock;
  const sourceKey = `${product.id}-0`;

  const add = () => {
    if (!canAdd) return;
    onAddToCart({ productId: product.id, name: product.name, color: selectedColor, size: selectedSize, price: product.price, qty });
    setQty(1);
  };

  return (
    <div className="look-card">
      <div
        className="look-photo relative overflow-hidden bg-neutral-100 cursor-pointer"
        style={{ aspectRatio: '4 / 5' }}
        onClick={() => photos.length && onOpenLightbox(photos, 0, sourceKey)}
      >
        {photos[0] ? (
          <img
            src={photos[0]} alt={product.name}
            className="w-full h-full object-cover"
            style={{
              ...(allOutOfStock ? { filter: 'grayscale(1)', opacity: 0.45 } : {}),
              viewTransitionName: activeSourceKey === sourceKey ? 'active-photo' : 'none',
            }}
          />
        ) : (
          <div className="w-full h-full flex items-center justify-center">
            <span className="eyebrow">sem foto</span>
          </div>
        )}
        {allOutOfStock && (
          <div className="absolute inset-0 flex items-center justify-center">
            <span className="eyebrow text-black border-t border-b border-black/50 py-2.5" style={{ letterSpacing: '0.3em', paddingLeft: '4px', paddingRight: '4px' }}>ESGOTADO</span>
          </div>
        )}
      </div>

      {photos.length > 1 && (
        <div className="flex gap-1.5 mt-2">
          {photos.map((ph, i) => (
            <img
              key={i} src={ph} alt=""
              onClick={() => onOpenLightbox(photos, i, `${product.id}-${i}`)}
              className="w-11 h-11 object-cover cursor-pointer opacity-70 hover:opacity-100 transition-opacity"
              style={{ viewTransitionName: activeSourceKey === `${product.id}-${i}` ? 'active-photo' : 'none' }}
            />
          ))}
        </div>
      )}

      <div className="pt-4">
        {product.category && <div className="eyebrow mb-1.5">{product.category}</div>}
        <div className="f-display text-[19px] leading-snug font-semibold" style={{ color: 'rgb(15 15 13)' }}>{product.name}</div>
        {product.description && <div className="f-body text-[13px] text-neutral-600 leading-relaxed mt-1.5">{product.description}</div>}
        {product.notes && <div className="f-body text-[12px] text-neutral-600 italic mt-1">{product.notes}</div>}

        {availableColors.length > 0 && (
          <div className="flex flex-wrap gap-1.5 mt-4">
            {availableColors.map(c => (
              <button
                key={c}
                onClick={() => { setSelectedColor(c); setSelectedSize(null); }}
                className={`size-pill ${selectedColor === c ? 'selected' : ''}`}
              >{c}</button>
            ))}
          </div>
        )}

        {selectedColor && sizesForColor.length > 0 && (
          <div className="flex flex-wrap gap-1.5 mt-2">
            {sizesForColor.map(v => (
              <button
                key={v.size}
                onClick={() => setSelectedSize(v.size)}
                className={`size-pill ${selectedSize === v.size ? 'selected' : ''}`}
              >{v.size}</button>
            ))}
          </div>
        )}

        <div className="flex items-center justify-between gap-4 mt-5 pt-4 border-t border-neutral-200">
          <span className="f-mono text-[17px]" style={{ color: 'rgb(15 15 13)' }}>{formatBRL(product.price)}</span>
          <div className="flex items-center gap-2 shrink-0">
            <span className="eyebrow" style={{ letterSpacing: '0.08em' }}>qtd</span>
            <input
              type="number" min="1" value={qty}
              onChange={e => setQty(Math.max(1, Number(e.target.value) || 1))}
              className="fw-input w-11 text-center"
              style={{ padding: '5px 4px', fontSize: '13px' }}
            />
          </div>
        </div>

        <button onClick={add} disabled={!canAdd} className="btn-primary w-full mt-3">
          {allOutOfStock ? 'Esgotado' : !selectedColor ? 'Escolha a cor' : !selectedSize ? 'Escolha o tamanho' : 'Adicionar à sacola'}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [catalog, setCatalog] = useState(undefined);
  const [cart, setCart] = useState([]);
  const [payment, setPayment] = useState('pix');
  const [clientName, setClientName] = useState('');
  const [lightbox, setLightbox] = useState(null);
  const [search, setSearch] = useState('');
  const [activeCategory, setActiveCategory] = useState(null);
  const [showWelcome, setShowWelcome] = useState(() => {
    try { return sessionStorage.getItem('movia_welcome_seen') !== '1'; } catch (e) { return true; }
  });
  const closeWelcome = () => {
    setShowWelcome(false);
    try { sessionStorage.setItem('movia_welcome_seen', '1'); } catch (e) { /* ignore */ }
  };

  useEffect(() => {
    (async () => {
      try {
        const { data, error } = await sb.from('catalog_public').select('*').eq('user_id', SHARED_STORE_ID).maybeSingle();
        if (error) throw error;
        setCatalog(data || null);
      } catch (e) {
        console.error('Erro ao carregar catálogo:', e);
        setCatalog(null);
      }
    })();
  }, []);

  const addToCart = (item) => {
    setCart(c => {
      const existing = c.find(i => i.productId === item.productId && i.color === item.color && i.size === item.size);
      if (existing) return c.map(i => i === existing ? { ...i, qty: i.qty + item.qty } : i);
      return [...c, item];
    });
  };

  const removeFromCart = (idx) => setCart(c => c.filter((_, i) => i !== idx));
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const itemCount = cart.reduce((s, i) => s + i.qty, 0);

  const openLightbox = (photos, index, sourceKey) => {
    const apply = () => setLightbox({ photos, index, sourceKey });
    if (document.startViewTransition) document.startViewTransition(() => flushSync(apply));
    else apply();
  };
  const closeLightbox = () => {
    const apply = () => setLightbox(null);
    if (document.startViewTransition) document.startViewTransition(() => flushSync(apply));
    else apply();
  };
  const navLightbox = (delta) => {
    const apply = () => setLightbox(lb => lb ? { ...lb, index: (lb.index + delta + lb.photos.length) % lb.photos.length } : lb);
    if (document.startViewTransition) document.startViewTransition(() => flushSync(apply));
    else apply();
  };

  const buildMessage = () => {
    const storeName = (catalog && catalog.store_name) || 'movia.';
    const lines = [];
    lines.push(`Novo pedido - ${storeName}`);
    if (clientName.trim()) lines.push(`Cliente: ${clientName.trim()}`);
    lines.push('');
    cart.forEach(item => {
      lines.push(`${item.qty}x ${item.name} (${item.color}/${item.size}) - ${formatBRL(item.price)} un. = ${formatBRL(item.price * item.qty)}`);
    });
    lines.push('');
    lines.push(`Total: ${formatBRL(total)}`);
    const paymentLabel = (PAYMENT_METHODS.find(p => p.value === payment) || {}).label || payment;
    lines.push(`Forma de pagamento: ${paymentLabel}`);
    return lines.join('\n');
  };

  const sendOrder = () => {
    if (cart.length === 0 || !catalog || !catalog.whatsapp_number) return;
    const msg = encodeURIComponent(buildMessage());
    const phone = catalog.whatsapp_number.replace(/\D/g, '');
    window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
  };

  if (catalog === undefined) {
    return (
      <div className="min-h-screen bg-white flex items-center justify-center f-body">
        <Fonts />
        <span className="eyebrow">carregando catálogo</span>
      </div>
    );
  }

  if (!catalog || !catalog.products || catalog.products.length === 0) {
    return (
      <div className="min-h-screen bg-white flex items-center justify-center f-body text-sm px-4 text-center">
        <Fonts />
        <span className="text-neutral-500">Catálogo ainda não publicado ou sem produtos disponíveis no momento.</span>
      </div>
    );
  }

  const categories = [...new Set(catalog.products.map(p => p.category).filter(Boolean))];
  const filteredProducts = catalog.products.filter(p => {
    const matchesCategory = !activeCategory || p.category === activeCategory;
    const matchesSearch = !search.trim() || p.name.toLowerCase().includes(search.trim().toLowerCase());
    return matchesCategory && matchesSearch;
  });

  return (
    <div className="min-h-screen f-body pb-40" style={{ backgroundColor: '#ffffff' }}>
      <Fonts />

      {showWelcome && <WelcomeBanner storeName={catalog.store_name} onClose={closeWelcome} />}

      <div className="max-w-6xl mx-auto px-6 pt-10 pb-8">
        <img src={LOGO_DATA_URI} alt={catalog.store_name || 'movia.'} className="h-9 sm:h-10 w-auto mb-9" />

        <div className="flex items-center gap-2 mb-4">
          <span style={{ width: '5px', height: '5px', borderRadius: '50%', background: '#e5e5e0', display: 'inline-block' }}></span>
          <span className="eyebrow">catálogo digital</span>
        </div>
        <h1 className="f-display font-extrabold leading-[1.15]" style={{ fontSize: 'clamp(28px, 5vw, 42px)', color: 'rgb(15 15 13)' }}>
          Peças pensadas para o seu<br /><span style={{ color: 'rgb(107 107 102)' }}>movimento.</span>
        </h1>
        <p className="f-body text-[14px] text-neutral-600 mt-4 max-w-md leading-relaxed">
          Navegue pela coleção completa da loja — fotos, tamanhos e cores de cada peça, tudo em um só lugar.
        </p>

        <div
          className="relative w-full flex items-center justify-center overflow-hidden mt-8"
          style={{ height: '52px', backgroundColor: '#f7f6f2', borderTop: '1px solid #e5e3dc', borderBottom: '1px solid #e5e3dc' }}
        >
          <img
            src={LOGO_DATA_URI} alt="movia."
            className="brand-fade absolute"
            style={{ height: '20px', width: 'auto' }}
          />
          <span
            className="slogan-fade absolute f-display font-extrabold text-black text-center px-6"
            style={{ fontSize: 'clamp(15px, 3vw, 20px)' }}
          >Seu movimento, sua evolução!</span>
        </div>

        <div className="flex flex-wrap items-center gap-2.5 mt-7">
          <input
            className="search-input flex-1 min-w-[180px]"
            placeholder="Buscar peça..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <button onClick={() => setActiveCategory(null)} className={`pill ${!activeCategory ? 'selected' : ''}`}>Todas</button>
          {categories.map(c => (
            <button key={c} onClick={() => setActiveCategory(c)} className={`pill ${activeCategory === c ? 'selected' : ''}`}>{c}</button>
          ))}
        </div>
      </div>

      <div className="border-t border-neutral-200" />

      <main className="max-w-6xl mx-auto px-6 py-10">
        {filteredProducts.length === 0 ? (
          <div className="text-center text-neutral-600 text-sm py-16">Nenhuma peça encontrada.</div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
            {filteredProducts.map((p) => (
              <LookCard
                key={p.id} product={p} onAddToCart={addToCart} onOpenLightbox={openLightbox}
                activeSourceKey={lightbox ? lightbox.sourceKey : null}
              />
            ))}
          </div>
        )}
      </main>

      <Lightbox
        photos={lightbox ? lightbox.photos : []}
        index={lightbox ? lightbox.index : null}
        onClose={closeLightbox}
        onNav={navLightbox}
      />

      {cart.length > 0 && (
        <div className="cart-drawer fixed bottom-0 left-0 right-0 z-20 border-t border-neutral-200" style={{ backgroundColor: 'rgba(255,255,255,0.97)', backdropFilter: 'blur(8px)' }}>
          <div className="max-w-6xl mx-auto p-5 sm:p-6">
            <div className="eyebrow mb-3">sacola · {itemCount} {itemCount === 1 ? 'peça' : 'peças'}</div>
            <div className="max-h-28 overflow-y-auto mb-4 space-y-1.5">
              {cart.map((item, idx) => (
                <div key={idx} className="flex items-center justify-between text-[13px] text-neutral-700">
                  <span className="f-body">{item.qty}x {item.name} <span className="text-neutral-600">({item.color}/{item.size})</span></span>
                  <span className="flex items-center gap-3">
                    <span className="f-mono">{formatBRL(item.price * item.qty)}</span>
                    <button onClick={() => removeFromCart(idx)} className="text-neutral-600 hover:text-black transition-colors">✕</button>
                  </span>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
              <input className="fw-input" placeholder="Seu nome (opcional)" value={clientName} onChange={e => setClientName(e.target.value)} />
              <select className="fw-input" value={payment} onChange={e => setPayment(e.target.value)}>
                {PAYMENT_METHODS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
              </select>
              <div className="f-mono text-lg flex items-center justify-center sm:justify-end" style={{ color: 'rgb(15 15 13)' }}>
                {formatBRL(total)}
              </div>
            </div>
            <button onClick={sendOrder} className="btn-primary w-full">
              Enviar pedido pelo WhatsApp
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
