<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — movia.</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  html, body { margin: 0; background: #000; }
  #root:empty::before {
    content: 'Carregando catálogo...';
    color: #888; font-family: monospace; font-size: 13px; display: block; padding: 24px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener('error', function (e) {
    var root = document.getElementById('root');
    root.innerHTML = '<div style="color:#fff;background:#000;font-family:monospace;padding:24px;white-space:pre-wrap;">'
      + '⚠ Erro ao carregar o catálogo:\n\n' + (e.message || e)
      + '\n\nVerifique sua conexão com a internet e tente recarregar a página.'
      + '</div>';
  });
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// =====================================================================
// Mesma configuração do Supabase usada no sistema principal.
// A anon key é feita para ser pública — é assim que o catálogo funciona
// sem exigir login do cliente.
// =====================================================================
const SUPABASE_URL = 'https://xjeyykvousnpxvjeourn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqZXl5a3ZvdXNucHh2amVvdXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMTA1NDYsImV4cCI6MjA5OTU4NjU0Nn0.Oq9Fy4fNvMz1459mKA_dP71RWU0udKSABumBHaJBGRg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function formatBRL(v) {
  return (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

const PAYMENT_METHODS = [
  { value: 'pix', label: 'Pix' },
  { value: 'cartao', label: 'Cartão (link de pagamento)' },
  { value: 'dinheiro', label: 'Dinheiro na entrega' },
];

function Fonts() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
      .fw-mono { font-family: 'JetBrains Mono', monospace; }
      .fw-body { font-family: 'Inter', sans-serif; }
      .fw-input {
        background: rgb(23 23 23); border: 1px solid rgb(64 64 64); color: rgb(245 245 244);
        border-radius: 4px; padding: 8px 10px; font-size: 14px; outline: none; width: 100%;
      }
      .fw-input:focus { border-color: rgb(255 255 255); }
      .fw-btn {
        background: rgb(255 255 255); color: rgb(0 0 0); font-weight: 700; font-size: 14px;
        padding: 10px 16px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      }
      .fw-btn:disabled { opacity: 0.4; }
      .fw-btn-ghost {
        background: transparent; border: 1px solid rgb(64 64 64); color: rgb(212 212 212);
        padding: 8px 14px; border-radius: 4px; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      }
    `}</style>
  );
}

function ProductCard({ product, qty, onQty, onAdd }) {
  return (
    <div className="bg-neutral-950 border border-neutral-800 flex flex-col">
      <div className="aspect-square bg-neutral-900 flex items-center justify-center overflow-hidden">
        {product.photoUrl ? (
          <img src={product.photoUrl} alt={product.name} className="w-full h-full object-cover" />
        ) : (
          <span className="text-neutral-700 text-xs fw-mono">sem foto</span>
        )}
      </div>
      <div className="p-3 flex flex-col gap-2 flex-1">
        <div className="text-sm font-medium text-neutral-100 leading-snug">{product.name}</div>
        {product.category && <div className="text-[11px] text-neutral-500">{product.category}</div>}
        <div className="fw-mono text-white font-bold text-base mt-auto">{formatBRL(product.price)}</div>
        <div className="flex items-center gap-2">
          <input type="number" min="1" value={qty} onChange={e => onQty(Math.max(1, Number(e.target.value) || 1))} className="fw-input w-16 text-center" />
          <button onClick={onAdd} className="fw-btn-ghost flex-1">Adicionar</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [catalog, setCatalog] = useState(undefined); // undefined = loading, null = not found
  const [qtyByProduct, setQtyByProduct] = useState({});
  const [cart, setCart] = useState([]);
  const [payment, setPayment] = useState('pix');
  const [clientName, setClientName] = useState('');

  useEffect(() => {
    (async () => {
      try {
        const { data, error } = await sb.from('catalog_public').select('*').limit(1).maybeSingle();
        if (error) throw error;
        setCatalog(data || null);
      } catch (e) {
        console.error('Erro ao carregar cat\u00e1logo:', e);
        setCatalog(null);
      }
    })();
  }, []);

  const addToCart = (product) => {
    const qty = qtyByProduct[product.id] || 1;
    setCart(c => {
      const existing = c.find(i => i.id === product.id);
      if (existing) {
        return c.map(i => i.id === product.id ? { ...i, qty: i.qty + qty } : i);
      }
      return [...c, { id: product.id, name: product.name, price: product.price, qty }];
    });
  };

  const removeFromCart = (id) => setCart(c => c.filter(i => i.id !== id));
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  const buildMessage = () => {
    const storeName = (catalog && catalog.store_name) || 'movia.';
    const lines = [];
    lines.push(`Novo pedido - ${storeName}`);
    if (clientName.trim()) lines.push(`Cliente: ${clientName.trim()}`);
    lines.push('');
    cart.forEach(item => {
      lines.push(`${item.qty}x ${item.name} - ${formatBRL(item.price)} un. = ${formatBRL(item.price * item.qty)}`);
    });
    lines.push('');
    lines.push(`Total: ${formatBRL(total)}`);
    const paymentLabel = (PAYMENT_METHODS.find(p => p.value === payment) || {}).label || payment;
    lines.push(`Forma de pagamento: ${paymentLabel}`);
    return lines.join('\n');
  };

  const sendOrder = () => {
    if (cart.length === 0 || !catalog || !catalog.whatsapp_number) return;
    const msg = encodeURIComponent(buildMessage());
    const phone = catalog.whatsapp_number.replace(/\D/g, '');
    window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
  };

  if (catalog === undefined) {
    return (
      <div className="min-h-screen bg-black text-neutral-500 flex items-center justify-center fw-mono text-sm">
        <Fonts />
        carregando catálogo...
      </div>
    );
  }

  if (!catalog || !catalog.products || catalog.products.length === 0) {
    return (
      <div className="min-h-screen bg-black text-neutral-400 flex items-center justify-center fw-body text-sm px-4 text-center">
        <Fonts />
        Catálogo ainda não publicado ou sem produtos disponíveis no momento.
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-black fw-body pb-32">
      <Fonts />
      <header className="border-b border-neutral-800 px-4 py-5 sticky top-0 bg-black z-10">
        <div className="max-w-5xl mx-auto">
          <div className="text-white text-xl font-semibold">{catalog.store_name || 'movia.'}</div>
          <div className="text-neutral-500 text-xs fw-mono mt-1">catálogo de produtos</div>
        </div>
      </header>

      <main className="max-w-5xl mx-auto p-4">
        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
          {catalog.products.map(p => (
            <ProductCard
              key={p.id}
              product={p}
              qty={qtyByProduct[p.id] || 1}
              onQty={v => setQtyByProduct(q => ({ ...q, [p.id]: v }))}
              onAdd={() => addToCart(p)}
            />
          ))}
        </div>
      </main>

      {cart.length > 0 && (
        <div className="fixed bottom-0 left-0 right-0 bg-neutral-950 border-t border-neutral-800 p-4">
          <div className="max-w-5xl mx-auto">
            <div className="max-h-32 overflow-y-auto mb-3">
              {cart.map(item => (
                <div key={item.id} className="flex items-center justify-between text-[13px] text-neutral-300 py-1">
                  <span>{item.qty}x {item.name}</span>
                  <span className="flex items-center gap-2">
                    {formatBRL(item.price * item.qty)}
                    <button onClick={() => removeFromCart(item.id)} className="text-neutral-600 hover:text-white">✕</button>
                  </span>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
              <input className="fw-input" placeholder="Seu nome (opcional)" value={clientName} onChange={e => setClientName(e.target.value)} />
              <select className="fw-input" value={payment} onChange={e => setPayment(e.target.value)}>
                {PAYMENT_METHODS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
              </select>
              <div className="fw-mono text-white font-bold text-lg flex items-center justify-center sm:justify-end">
                Total: {formatBRL(total)}
              </div>
            </div>
            <button onClick={sendOrder} className="fw-btn w-full">
              Enviar pedido via WhatsApp
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
