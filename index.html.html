const SIZES = ['P', 'M', 'G', 'GG'];
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function uid(prefix = 'id') {
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}
function formatBRL(v) {
  return (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function monthKey(dateStr) { return (dateStr || '').slice(0, 7); }
function monthLabel(mk) {
  if (!mk) return '';
  const [y, m] = mk.split('-');
  return MONTHS[parseInt(m, 10) - 1] + '/' + y.slice(2);
}
function emptyData() {
  return { products: [], clients: [], sales: [], purchases: [], finance: [], orders: [], pricingCosts: [], pricingMargin: 100 };
}

function Fonts() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Poppins:wght@500;600;700&display=swap');
      .fw-display { font-family: 'Archivo Black', sans-serif; }
      .fw-logo { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
      .fw-mono { font-family: 'JetBrains Mono', monospace; }
      .fw-body { font-family: 'Inter', sans-serif; }
      .fw-clip { clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%); }
      .fw-input {
        background: rgb(23 23 23); border: 1px solid rgb(64 64 64); color: rgb(245 245 244);
        border-radius: 4px; padding: 6px 10px; font-size: 13px; outline: none;
      }
      .fw-input:focus { border-color: rgb(255 255 255); }
      .fw-btn {
        background: rgb(255 255 255); color: rgb(0 0 0); font-weight: 700; font-size: 13px;
        padding: 7px 14px; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px;
      }
      .fw-btn:hover { background: rgb(212 212 212); }
      .fw-btn-ghost {
        background: transparent; border: 1px solid rgb(64 64 64); color: rgb(212 212 212);
        padding: 6px 12px; border-radius: 4px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
      }
      .fw-btn-ghost:hover { border-color: rgb(255 255 255); color: rgb(255 255 255); }
      .fw-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: rgb(115 115 115); padding: 8px 10px; border-bottom: 1px solid rgb(38 38 38); }
      .fw-table td { padding: 8px 10px; border-bottom: 1px solid rgb(31 31 31); font-size: 13px; color: rgb(229 229 229); }
      .fw-table tr:hover td { background: rgb(23 23 23); }
    `}</style>
  );
}

// ---------- Reusable small components ----------
function Field({ label, children }) {
  return (
    <label className="flex flex-col gap-1 text-xs text-neutral-400">
      {label}
      {children}
    </label>
  );
}

function StatCard({ label, value, sub, tone = 'default', alert = false }) {
  return (
    <div className={`fw-clip bg-neutral-950 border px-5 py-4 flex-1 min-w-[160px] ${alert ? 'border-white' : 'border-neutral-800'}`}>
      <div className="text-[10px] uppercase tracking-widest text-neutral-500 fw-body font-semibold mb-1 flex items-center gap-1">
        {alert && <AlertTriangle size={11} />} {label}
      </div>
      <div className="fw-mono text-2xl font-bold text-white">{value}</div>
      {sub && <div className="text-[11px] text-neutral-500 mt-1">{sub}</div>}
    </div>
  );
}

function Section({ title, action, children }) {
  return (
    <div className="mb-8">
      <div className="flex items-center justify-between mb-3">
        <h2 className="fw-display text-lg text-neutral-100 tracking-tight">{title}</h2>
        {action}
      </div>
      {children}
    </div>
  );
}

const PIE_COLORS = ['#ffffff', '#525252'];

// ---------- App ----------
function App({ sb, session, onSignOut }) {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [saveState, setSaveState] = useState('idle');

  useEffect(() => {
    (async () => {
      try {
        const { data: row, error } = await sb
          .from('movia_data')
          .select('data')
          .eq('user_id', session.user.id)
          .maybeSingle();
        if (error) throw error;
        setData(row && row.data && Object.keys(row.data).length ? { ...emptyData(), ...row.data } : emptyData());
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
        setData(emptyData());
      }
    })();
  }, []);

  useEffect(() => {
    if (data === null) return;
    setSaveState('saving');
    const t = setTimeout(async () => {
      try {
        const { error } = await sb
          .from('movia_data')
          .upsert({ user_id: session.user.id, data, updated_at: new Date().toISOString() });
        if (error) throw error;
        setSaveState('saved');
      } catch (e) {
        console.error('Erro ao salvar dados:', e);
        setSaveState('error');
      }
    }, 500);
    return () => clearTimeout(t);
  }, [data]);

  // ---- derived (must run on every render, even while data is still loading) ----
  const safeData = data || emptyData();
  const lowStock = useMemo(() => {
    const list = [];
    safeData.products.forEach(p => {
      p.variants.forEach(v => {
        if (v.stock <= (p.minStock ?? 3)) list.push({ product: p.name, color: v.color, size: v.size, stock: v.stock, min: p.minStock ?? 3, productId: p.id });
      });
    });
    return list;
  }, [safeData.products]);

  const thisMonth = monthKey(todayISO());
  const salesThisMonth = useMemo(() => safeData.sales.filter(s => monthKey(s.date) === thisMonth), [safeData.sales, thisMonth]);
  const revenueThisMonth = salesThisMonth.reduce((s, x) => s + x.total, 0);
  const profitThisMonth = salesThisMonth.reduce((s, x) => s + x.profit, 0);
  const pendingOrders = safeData.orders.filter(o => o.status === 'pendente').length;

  const revenueByMonth = useMemo(() => {
    const map = {};
    safeData.sales.forEach(s => { const mk = monthKey(s.date); map[mk] = (map[mk] || 0) + s.total; });
    return Object.entries(map).sort(([a], [b]) => a.localeCompare(b)).slice(-6).map(([mk, v]) => ({ month: monthLabel(mk), receita: Math.round(v * 100) / 100 }));
  }, [safeData.sales]);

  const salesByType = useMemo(() => {
    const varejo = safeData.sales.filter(s => s.type === 'varejo').reduce((s, x) => s + x.total, 0);
    const atacado = safeData.sales.filter(s => s.type === 'atacado').reduce((s, x) => s + x.total, 0);
    return [{ name: 'Varejo', value: varejo }, { name: 'Atacado', value: atacado }].filter(x => x.value > 0);
  }, [safeData.sales]);

  const cashFlow = useMemo(() => {
    const sorted = [...safeData.finance].sort((a, b) => a.date.localeCompare(b.date));
    let bal = 0;
    return sorted.map(f => { bal += f.type === 'entrada' ? f.value : -f.value; return { date: f.date.slice(5), saldo: Math.round(bal * 100) / 100 }; });
  }, [safeData.finance]);

  if (data === null) {
    return (
      <div className="min-h-screen bg-black text-neutral-500 flex items-center justify-center fw-mono text-sm">
        carregando sistema...
      </div>
    );
  }

  // ---- mutations ----
  const addProduct = (p) => setData(d => ({ ...d, products: [...d.products, p] }));
  const updateProduct = (id, patch) => setData(d => ({ ...d, products: d.products.map(p => p.id === id ? { ...p, ...patch } : p) }));
  const deleteProduct = (id) => setData(d => ({ ...d, products: d.products.filter(p => p.id !== id) }));
  const setVariantStock = (productId, color, size, stock) => setData(d => ({
    ...d,
    products: d.products.map(p => p.id !== productId ? p : {
      ...p, variants: p.variants.map(v => v.color === color && v.size === size ? { ...v, stock: Math.max(0, Number(stock) || 0) } : v)
    })
  }));

  const addClient = (c) => setData(d => ({ ...d, clients: [...d.clients, c] }));
  const deleteClient = (id) => setData(d => ({ ...d, clients: d.clients.filter(c => c.id !== id) }));

  const registerSale = (sale) => {
    setData(d => {
      const products = d.products.map(p => ({ ...p, variants: p.variants.map(v => ({ ...v })) }));
      let costTotal = 0;
      sale.items.forEach(item => {
        const prod = products.find(p => p.id === item.productId);
        if (prod) {
          const variant = prod.variants.find(v => v.color === item.color && v.size === item.size);
          if (variant) variant.stock = Math.max(0, variant.stock - item.qty);
          costTotal += (prod.cost || 0) * item.qty;
        }
      });
      const total = sale.items.reduce((s, i) => s + i.price * i.qty, 0);
      const financeId = uid('fin');
      const client = d.clients.find(c => c.id === sale.clientId);
      const newSale = { ...sale, id: uid('sale'), total, costTotal, profit: total - costTotal, financeId };
      const financeEntry = {
        id: financeId, date: sale.date, type: 'entrada', category: 'venda',
        desc: `Venda${client ? ' - ' + client.name : ''} (${sale.type})`, value: total, auto: true
      };
      return { ...d, products, sales: [...d.sales, newSale], finance: [...d.finance, financeEntry] };
    });
  };
  const deleteSale = (id) => setData(d => {
    const sale = d.sales.find(s => s.id === id);
    if (!sale) return d;
    const products = d.products.map(p => ({ ...p, variants: p.variants.map(v => ({ ...v })) }));
    sale.items.forEach(item => {
      const prod = products.find(p => p.id === item.productId);
      if (prod) {
        const variant = prod.variants.find(v => v.color === item.color && v.size === item.size);
        if (variant) variant.stock += item.qty;
      }
    });
    return { ...d, products, sales: d.sales.filter(s => s.id !== id), finance: d.finance.filter(f => f.id !== sale.financeId) };
  });

  const registerPurchase = (purchase) => {
    setData(d => {
      const products = d.products.map(p => ({ ...p, variants: p.variants.map(v => ({ ...v })) }));
      purchase.items.forEach(item => {
        const prod = products.find(p => p.id === item.productId);
        if (prod) {
          const variant = prod.variants.find(v => v.color === item.color && v.size === item.size);
          if (variant) variant.stock += item.qty;
        }
      });
      const total = purchase.items.reduce((s, i) => s + i.cost * i.qty, 0);
      const financeId = uid('fin');
      const newPurchase = { ...purchase, id: uid('purch'), total, financeId };
      const financeEntry = { id: financeId, date: purchase.date, type: 'saida', category: 'compra', desc: `Compra - ${purchase.supplier}`, value: total, auto: true };
      return { ...d, products, purchases: [...d.purchases, newPurchase], finance: [...d.finance, financeEntry] };
    });
  };
  const deletePurchase = (id) => setData(d => {
    const purchase = d.purchases.find(p => p.id === id);
    if (!purchase) return d;
    const products = d.products.map(p => ({ ...p, variants: p.variants.map(v => ({ ...v })) }));
    purchase.items.forEach(item => {
      const prod = products.find(p => p.id === item.productId);
      if (prod) {
        const variant = prod.variants.find(v => v.color === item.color && v.size === item.size);
        if (variant) variant.stock = Math.max(0, variant.stock - item.qty);
      }
    });
    return { ...d, products, purchases: d.purchases.filter(p => p.id !== id), finance: d.finance.filter(f => f.id !== purchase.financeId) };
  });

  const addFinance = (entry) => setData(d => ({ ...d, finance: [...d.finance, { ...entry, id: uid('fin'), auto: false }] }));
  const deleteFinance = (id) => setData(d => ({ ...d, finance: d.finance.filter(f => f.id !== id) }));

  const addOrder = (order) => setData(d => ({ ...d, orders: [...d.orders, { ...order, id: uid('order') }] }));
  const updateOrderStatus = (id, status) => setData(d => ({ ...d, orders: d.orders.map(o => o.id === id ? { ...o, status } : o) }));
  const deleteOrder = (id) => setData(d => ({ ...d, orders: d.orders.filter(o => o.id !== id) }));

  const addPricingCost = (cost) => setData(d => ({ ...d, pricingCosts: [...d.pricingCosts, { ...cost, id: uid('cost') }] }));
  const deletePricingCost = (id) => setData(d => ({ ...d, pricingCosts: d.pricingCosts.filter(c => c.id !== id) }));
  const setPricingMargin = (value) => setData(d => ({ ...d, pricingMargin: value }));
  const applyPrice = (productId, field, price) => updateProduct(productId, { [field]: Math.round(price * 100) / 100 });

  // ---- derived (moved above the loading-state early return, see top of App) ----

  return (
    <div className="min-h-screen bg-black fw-body flex">
      <Fonts />
      {/* Sidebar */}
      <aside className="w-56 shrink-0 bg-black border-r border-neutral-800 flex flex-col">
        <div className="px-5 py-6 border-b border-neutral-800">
          <img src={LOGO_DATA_URI} alt="movia." className="h-7 w-auto" />
          <div className="fw-mono text-[10px] text-neutral-500 mt-2 tracking-widest uppercase">Gestão</div>
        </div>
        <nav className="flex-1 py-3">
          {NAV.map(item => {
            const Icon = item.icon;
            const active = tab === item.key;
            return (
              <button
                key={item.key}
                onClick={() => setTab(item.key)}
                className={`w-full flex items-center gap-3 px-5 py-2.5 text-sm transition-colors ${active ? 'bg-white text-black font-semibold' : 'text-neutral-400 hover:text-neutral-100 hover:bg-neutral-800'}`}
              >
                <Icon size={16} />
                {item.label}
                {item.key === 'stock' && lowStock.length > 0 && !active && (
                  <span className="ml-auto fw-mono text-[10px] bg-white text-black px-1.5 rounded-full font-bold">{lowStock.length}</span>
                )}
                {item.key === 'orders' && pendingOrders > 0 && !active && (
                  <span className="ml-auto fw-mono text-[10px] bg-white text-black px-1.5 rounded-full font-bold">{pendingOrders}</span>
                )}
              </button>
            );
          })}
        </nav>
        <div className="px-5 py-3 border-t border-neutral-800">
          <div className="fw-mono text-[10px] text-neutral-600 mb-2">
            {saveState === 'saving' ? 'salvando...' : saveState === 'error' ? 'erro ao salvar' : 'dados salvos'}
          </div>
          <div className="flex items-center justify-between">
            <span className="text-[11px] text-neutral-500 truncate max-w-[120px]" title={session.user.email}>{session.user.email}</span>
            <button onClick={onSignOut} className="text-[11px] text-neutral-500 hover:text-white underline shrink-0">sair</button>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 p-8 max-w-6xl">
        {tab === 'dashboard' && (
          <DashboardTab
            revenueThisMonth={revenueThisMonth} profitThisMonth={profitThisMonth}
            pendingOrders={pendingOrders} lowStock={lowStock}
            revenueByMonth={revenueByMonth} salesByType={salesByType}
          />
        )}
        {tab === 'products' && (
          <ProductsTab products={data.products} onAdd={addProduct} onUpdate={updateProduct} onDelete={deleteProduct} />
        )}
        {tab === 'clients' && (
          <ClientsTab clients={data.clients} onAdd={addClient} onDelete={deleteClient} />
        )}
        {tab === 'stock' && (
          <StockTab products={data.products} onSetStock={setVariantStock} onUpdateProduct={updateProduct} />
        )}
        {tab === 'sales' && (
          <SalesTab products={data.products} clients={data.clients} sales={data.sales} onRegister={registerSale} onDelete={deleteSale} />
        )}
        {tab === 'purchases' && (
          <PurchasesTab products={data.products} purchases={data.purchases} onRegister={registerPurchase} onDelete={deletePurchase} />
        )}
        {tab === 'pricing' && (
          <PricingTab
            products={data.products}
            costs={data.pricingCosts}
            margin={data.pricingMargin}
            onAddCost={addPricingCost}
            onDeleteCost={deletePricingCost}
            onSetMargin={setPricingMargin}
            onApplyPrice={applyPrice}
          />
        )}
        {tab === 'finance' && (
          <FinanceTab finance={data.finance} onAdd={addFinance} onDelete={deleteFinance} cashFlow={cashFlow} />
        )}
        {tab === 'expenses' && (
          <ExpensesTab finance={data.finance} sales={data.sales} onAdd={addFinance} onDelete={deleteFinance} />
        )}
        {tab === 'orders' && (
          <OrdersTab products={data.products} clients={data.clients} orders={data.orders} onAdd={addOrder} onUpdateStatus={updateOrderStatus} onDelete={deleteOrder} />
        )}
        {tab === 'reports' && (
          <ReportsTab sales={data.sales} purchases={data.purchases} finance={data.finance} products={data.products} />
        )}
      </main>
    </div>
  );
}

// ---------- Dashboard ----------
function DashboardTab({ revenueThisMonth, profitThisMonth, pendingOrders, lowStock, revenueByMonth, salesByType }) {
  return (
    <div>
      <div className="fw-clip bg-neutral-950 border border-neutral-800 border-b-2 border-b-white px-6 py-5 mb-8 flex flex-wrap gap-6">
        <StatCard label="Vendas do mês" value={formatBRL(revenueThisMonth)} />
        <StatCard label="Lucro do mês" value={formatBRL(profitThisMonth)} alert={profitThisMonth < 0} />
        <StatCard label="Pedidos pendentes" value={pendingOrders} alert={pendingOrders > 0} />
        <StatCard label="Itens em estoque baixo" value={lowStock.length} alert={lowStock.length > 0} />
      </div>

      <div className="grid grid-cols-2 gap-6 mb-8">
        <Section title="Receita — últimos meses">
          <div className="bg-neutral-950 border border-neutral-800 p-4 h-64">
            {revenueByMonth.length === 0 ? <EmptyState text="Nenhuma venda registrada ainda." /> : (
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={revenueByMonth}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#262626" />
                  <XAxis dataKey="month" stroke="#737373" fontSize={12} />
                  <YAxis stroke="#737373" fontSize={12} />
                  <Tooltip contentStyle={{ background: '#171717', border: '1px solid #404040', fontSize: 12 }} formatter={(v) => formatBRL(v)} />
                  <Bar dataKey="receita" fill="#ffffff" radius={[3, 3, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            )}
          </div>
        </Section>
        <Section title="Atacado vs Varejo">
          <div className="bg-neutral-950 border border-neutral-800 p-4 h-64">
            {salesByType.length === 0 ? <EmptyState text="Nenhuma venda registrada ainda." /> : (
              <ResponsiveContainer width="100%" height="100%">
                <PieChart>
                  <Pie data={salesByType} dataKey="value" nameKey="name" outerRadius={80} label={(e) => `${e.name}: ${formatBRL(e.value)}`}>
                    {salesByType.map((entry, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
                  </Pie>
                  <Tooltip contentStyle={{ background: '#171717', border: '1px solid #404040', fontSize: 12 }} formatter={(v) => formatBRL(v)} />
                </PieChart>
              </ResponsiveContainer>
            )}
          </div>
        </Section>
      </div>

      <Section title="Alertas de reposição de estoque">
        {lowStock.length === 0 ? (
          <div className="bg-neutral-950 border border-neutral-800 p-4 text-sm text-neutral-500">Nenhum item abaixo do estoque mínimo. 👍</div>
        ) : (
          <div className="bg-neutral-950 border border-neutral-800 overflow-x-auto">
            <table className="w-full fw-table">
              <thead><tr><th>Produto</th><th>Cor</th><th>Tamanho</th><th>Estoque</th><th>Mínimo</th></tr></thead>
              <tbody>
                {lowStock.map((item, i) => (
                  <tr key={i}>
                    <td>{item.product}</td><td>{item.color}</td><td>{item.size}</td>
                    <td className="text-white font-semibold flex items-center gap-1"><AlertTriangle size={13} />{item.stock}</td>
                    <td>{item.min}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Section>
    </div>
  );
}

function EmptyState({ text }) {
  return <div className="h-full flex items-center justify-center text-sm text-neutral-600">{text}</div>;
}

// ---------- Products ----------
function ProductsTab({ products, onAdd, onUpdate, onDelete }) {
  const [form, setForm] = useState({ name: '', category: '', cost: '', retail: '', wholesale: '', minStock: 3, colors: '' });
  const [editing, setEditing] = useState(null);

  const submit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return;
    const colors = form.colors.split(',').map(c => c.trim()).filter(Boolean);
    if (colors.length === 0) colors.push('Único');
    const variants = colors.flatMap(color => SIZES.map(size => ({ color, size, stock: 0 })));
    onAdd({
      id: uid('prod'), name: form.name, category: form.category || 'Geral',
      cost: Number(form.cost) || 0, retail: Number(form.retail) || 0, wholesale: Number(form.wholesale) || 0,
      minStock: Number(form.minStock) || 3, variants
    });
    setForm({ name: '', category: '', cost: '', retail: '', wholesale: '', minStock: 3, colors: '' });
  };

  return (
    <div>
      <Section title="Cadastro de produtos">
        <form onSubmit={submit} className="bg-neutral-950 border border-neutral-800 p-4 grid grid-cols-3 gap-3 mb-4">
          <Field label="Nome do produto"><input className="fw-input" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Legging Fusô" /></Field>
          <Field label="Categoria"><input className="fw-input" value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))} placeholder="Legging, Top, Camiseta..." /></Field>
          <Field label="Cores (separadas por vírgula)"><input className="fw-input" value={form.colors} onChange={e => setForm(f => ({ ...f, colors: e.target.value }))} placeholder="Preto, Bege, Verde" /></Field>
          <Field label="Preço de custo"><input type="number" step="0.01" className="fw-input" value={form.cost} onChange={e => setForm(f => ({ ...f, cost: e.target.value }))} /></Field>
          <Field label="Preço varejo"><input type="number" step="0.01" className="fw-input" value={form.retail} onChange={e => setForm(f => ({ ...f, retail: e.target.value }))} /></Field>
          <Field label="Preço atacado"><input type="number" step="0.01" className="fw-input" value={form.wholesale} onChange={e => setForm(f => ({ ...f, wholesale: e.target.value }))} /></Field>
          <Field label="Estoque mínimo por variação"><input type="number" className="fw-input" value={form.minStock} onChange={e => setForm(f => ({ ...f, minStock: e.target.value }))} /></Field>
          <div className="col-span-3 flex justify-end"><button className="fw-btn" type="submit"><Plus size={14} />Adicionar produto</button></div>
        </form>
      </Section>

      <div className="bg-neutral-950 border border-neutral-800 overflow-x-auto">
        <table className="w-full fw-table">
          <thead><tr><th>Produto</th><th>Categoria</th><th>Custo</th><th>Varejo</th><th>Atacado</th><th>Variações</th><th></th></tr></thead>
          <tbody>
            {products.length === 0 && <tr><td colSpan={7} className="text-neutral-600 text-center py-6">Nenhum produto cadastrado.</td></tr>}
            {products.map(p => (
              <tr key={p.id}>
                <td className="font-medium text-neutral-100">{p.name}</td>
                <td>{p.category}</td>
                <td>{formatBRL(p.cost)}</td>
                <td>{formatBRL(p.retail)}</td>
                <td>{formatBRL(p.wholesale)}</td>
                <td>{p.variants.length} ({[...new Set(p.variants.map(v => v.color))].join(', ')})</td>
                <td><button onClick={() => onDelete(p.id)} className="fw-btn-ghost"><Trash2 size={13} /></button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

            {clients.length === 0 && <tr><td colSpan={5} className="text-neutral-600 text-center py-6">Nenhum cliente cadastrado.</td></tr>}

                <td className="font-medium text-neutral-100">{c.name}</td>
                <td>{c.phone}</td>
                <td className="capitalize">{c.type}</td>

}

// ---------- Stock ----------
function StockTab({ products, onSetStock, onUpdateProduct }) {
  return (
    <div>
      <Section title="Controle de estoque por cor e tamanho">
        {products.length === 0 && <div className="text-neutral-600 text-sm">Cadastre produtos primeiro na aba Produtos.</div>}
        {products.map(p => {
          const colors = [...new Set(p.variants.map(v => v.color))];
          return (
            <div key={p.id} className="bg-neutral-950 border border-neutral-800 p-4 mb-4">
              <div className="flex items-center justify-between mb-3">
                <div className="font-semibold text-neutral-100">{p.name}</div>
                <label className="flex items-center gap-2 text-xs text-neutral-500">
                  Estoque mínimo:
                  <input type="number" className="fw-input w-16" value={p.minStock ?? 3} onChange={e => onUpdateProduct(p.id, { minStock: Number(e.target.value) })} />
                </label>
              </div>
              <table className="w-full fw-table">
                <thead><tr><th>Cor</th>{SIZES.map(s => <th key={s} className="text-center">{s}</th>)}</tr></thead>
                <tbody>
                  {colors.map(color => (
                    <tr key={color}>
                      <td className="font-medium">{color}</td>
                      {SIZES.map(size => {
                        const v = p.variants.find(v => v.color === color && v.size === size);
                        const low = v && v.stock <= (p.minStock ?? 3);
                        return (
                          <td key={size} className="text-center">
                            <input
                              type="number" min="0"
                              className="fw-input w-16 text-center"
                              style={low ? { borderColor: '#ffffff', color: '#ffffff', fontWeight: 700, boxShadow: '0 0 0 1px #ffffff' } : {}}
                              value={v ? v.stock : 0}
                              onChange={e => onSetStock(p.id, color, size, e.target.value)}
                            />
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })}
      </Section>
    </div>
  );
}

function SalesTab({ products, clients, sales, onRegister, onDelete }) {
  const [clientId, setClientId] = useState('');
  const [type, setType] = useState('varejo');
  const [date, setDate] = useState(todayISO());
  const [cart, setCart] = useState([]);
  const [pick, setPick] = useState({ productId: '', color: '', size: '', qty: 1 });

  const selectedProduct = products.find(p => p.id === pick.productId);
  const colorsAvail = selectedProduct ? [...new Set(selectedProduct.variants.map(v => v.color))] : [];
  const variantAvail = selectedProduct && pick.color ? selectedProduct.variants.find(v => v.color === pick.color && v.size === pick.size) : null;

  const addToCart = () => {
    if (!selectedProduct || !pick.color || !pick.size || !pick.qty) return;
    const price = type === 'atacado' ? selectedProduct.wholesale : selectedProduct.retail;
    setCart(c => [...c, { productId: pick.productId, productName: selectedProduct.name, color: pick.color, size: pick.size, qty: Number(pick.qty), price }]);
    setPick({ productId: '', color: '', size: '', qty: 1 });
  };
  const removeFromCart = (i) => setCart(c => c.filter((_, idx) => idx !== i));
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  const submitSale = () => {
    if (cart.length === 0) return;
    const client = clients.find(c => c.id === clientId);

    <div>
      <Section title="Registrar venda">

            <Field label="Tipo de venda">

              </select>
            </Field>
          </div>

          <div className="grid grid-cols-5 gap-3 items-end mb-3 border-t border-neutral-800 pt-3">
            <Field label="Produto">
              <select className="fw-input" value={pick.productId} onChange={e => setPick({ productId: e.target.value, color: '', size: '', qty: 1 })}>
                <option value="">Selecione</option>
                {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </Field>
            <Field label="Cor">
              <select className="fw-input" value={pick.color} onChange={e => setPick(p => ({ ...p, color: e.target.value }))} disabled={!selectedProduct}>
                <option value="">Selecione</option>
                {colorsAvail.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
            <Field label="Tamanho">
              <select className="fw-input" value={pick.size} onChange={e => setPick(p => ({ ...p, size: e.target.value }))} disabled={!pick.color}>
                <option value="">Selecione</option>
                {SIZES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </Field>
            <Field label={`Qtd ${variantAvail ? `(disp: ${variantAvail.stock})` : ''}`}>
              <input type="number" min="1" className="fw-input" value={pick.qty} onChange={e => setPick(p => ({ ...p, qty: e.target.value }))} />
            </Field>
            <button onClick={addToCart} className="fw-btn justify-center"><Plus size={14} />Adicionar item</button>

          {cart.length > 0 && (
            <div className="border-t border-neutral-800 pt-3">
              <table className="w-full fw-table">
                <thead><tr><th>Produto</th><th>Cor</th><th>Tam.</th><th>Qtd</th><th>Preço unit.</th><th>Subtotal</th><th></th></tr></thead>
                <tbody>
                  {cart.map((i, idx) => (
                    <tr key={idx}>
                      <td>{i.productName}</td><td>{i.color}</td><td>{i.size}</td><td>{i.qty}</td>
                      <td>{formatBRL(i.price)}</td><td>{formatBRL(i.price * i.qty)}</td>
                      <td><button onClick={() => removeFromCart(idx)} className="fw-btn-ghost"><X size={12} /></button></td>

                </tbody>
              </table>
              <div className="flex items-center justify-between mt-3">
                <div className="fw-mono text-white font-bold text-lg">Total: {formatBRL(total)}</div>
                <button onClick={submitSale} className="fw-btn"><Check size={14} />Finalizar venda</button>
              </div>

                  <td>{formatBRL(s.total)}</td>

// ---------- Pricing calculator ----------
function PricingTab({ products, costs, margin, onAddCost, onDeleteCost, onSetMargin, onApplyPrice }) {
  const [productId, setProductId] = useState('');
  const [manualCost, setManualCost] = useState('');
  const [form, setForm] = useState({ name: '', type: 'fixo', value: '' });

  const product = products.find(p => p.id === productId);
  const baseCost = productId ? (manualCost !== '' ? Number(manualCost) : (product ? product.cost : 0)) : Number(manualCost) || 0;

  const fixedItems = costs.filter(c => c.type === 'fixo');
  const percentItems = costs.filter(c => c.type === 'percentual');
  const marginNum = Number(margin) || 0;

  const totalFixed = baseCost + fixedItems.reduce((s, c) => s + Number(c.value), 0);
  const totalPercent = percentItems.reduce((s, c) => s + Number(c.value), 0) + marginNum;
  const invalid = totalPercent >= 100;
  const suggestedPrice = invalid ? null : totalFixed / (1 - totalPercent / 100);

  const submitCost = (e) => {
    e.preventDefault();
    if (!form.name.trim() || form.value === '') return;
    onAddCost({ name: form.name, type: form.type, value: Number(form.value) });
    setForm({ name: '', type: 'fixo', value: '' });
  };

  return (
    <div>
      <Section title="Custos cadastrados">
        <form onSubmit={submitCost} className="bg-neutral-950 border border-neutral-800 p-4 grid grid-cols-4 gap-3 mb-4">
          <Field label="Nome do custo"><input className="fw-input" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Frete, embalagem, taxa cartão..." /></Field>
          <Field label="Tipo">
            <select className="fw-input" value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
              <option value="fixo">Valor fixo (R$)</option>
              <option value="percentual">Percentual (%) do preço</option>
            </select>
          </Field>
          <Field label={form.type === 'fixo' ? 'Valor (R$)' : 'Percentual (%)'}>
            <input type="number" step="0.01" className="fw-input" value={form.value} onChange={e => setForm(f => ({ ...f, value: e.target.value }))} />
          </Field>
          <div className="flex items-end"><button className="fw-btn" type="submit"><Plus size={14} />Adicionar custo</button></div>
        </form>
        <div className="bg-neutral-950 border border-neutral-800 overflow-x-auto">
          <table className="w-full fw-table">
            <thead><tr><th>Custo</th><th>Tipo</th><th>Valor</th><th></th></tr></thead>
            <tbody>
              {costs.length === 0 && <tr><td colSpan={4} className="text-neutral-600 text-center py-6">Nenhum custo cadastrado ainda.</td></tr>}
              {costs.map(c => (
                <tr key={c.id}>
                  <td className="text-neutral-100">{c.name}</td>
                  <td>{c.type === 'fixo' ? 'Valor fixo' : 'Percentual do preço'}</td>
                  <td>{c.type === 'fixo' ? formatBRL(c.value) : `${c.value}%`}</td>
                  <td><button onClick={() => onDeleteCost(c.id)} className="fw-btn-ghost"><Trash2 size={13} /></button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Section>

      <Section title="Calcular preço de venda">
        <div className="bg-neutral-950 border border-neutral-800 p-4 mb-4">
          <div className="grid grid-cols-3 gap-3 mb-4">
            <Field label="Produto (opcional — preenche o custo automaticamente)">
              <select className="fw-input" value={productId} onChange={e => { setProductId(e.target.value); setManualCost(''); }}>
                <option value="">Nenhum — inserir custo manualmente</option>
                {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </Field>
            <Field label="Custo do produto (R$)">
              <input type="number" step="0.01" className="fw-input"
                value={manualCost !== '' ? manualCost : (product ? product.cost : '')}
                onChange={e => setManualCost(e.target.value)} />
            </Field>
            <Field label="Margem de lucro desejada (%)">
              <input type="number" step="0.01" className="fw-input" value={margin} onChange={e => onSetMargin(e.target.value === '' ? '' : Number(e.target.value))} />
            </Field>
          </div>

          {invalid ? (
            <div className="text-[13px] text-white bg-neutral-900 border border-white p-3">
              ⚠ Os percentuais cadastrados (custos + margem) somam {totalPercent.toFixed(1)}%, que é igual ou maior que 100%.
              Não existe preço possível nessas condições — reduza a margem ou os custos percentuais.
            </div>
          ) : (
            <div>
              <div className="flex flex-wrap gap-4 mb-4">
                <StatCard label="Preço de venda sugerido" value={formatBRL(suggestedPrice)} />
                <StatCard label="Custos totais (R$)" value={formatBRL(totalFixed + percentItems.reduce((s, c) => s + suggestedPrice * (Number(c.value) / 100), 0))} />
                <StatCard label="Lucro líquido estimado" value={formatBRL(suggestedPrice * (marginNum / 100))} sub={`${marginNum}% do preço`} />
              </div>

              <div className="bg-neutral-900 border border-neutral-800 p-4 mb-4">
                <div className="text-sm font-semibold text-neutral-200 mb-3">Como esse preço se decompõe</div>
                <table className="w-full fw-table">
                  <thead><tr><th>Item</th><th>Tipo</th><th>Valor em R$ no preço final</th></tr></thead>
                  <tbody>
                    <tr><td>Custo do produto + custos fixos</td><td>Fixo</td><td>{formatBRL(totalFixed)}</td></tr>
                    {percentItems.map(c => (
                      <tr key={c.id}><td>{c.name}</td><td>{c.value}%</td><td>{formatBRL(suggestedPrice * (Number(c.value) / 100))}</td></tr>
                    ))}
                    <tr><td className="font-semibold text-white">Margem de lucro</td><td>{marginNum}%</td><td className="font-semibold text-white">{formatBRL(suggestedPrice * (marginNum / 100))}</td></tr>
                  </tbody>
                </table>
              </div>

              {product && (
                <div className="flex gap-3">
                  <button onClick={() => onApplyPrice(product.id, 'retail', suggestedPrice)} className="fw-btn"><Check size={14} />Aplicar como preço de varejo</button>
                  <button onClick={() => onApplyPrice(product.id, 'wholesale', suggestedPrice)} className="fw-btn-ghost"><Check size={14} />Aplicar como preço de atacado</button>
                </div>
              )}
            </div>
          )}
        </div>
      </Section>
    </div>
  );
}

const EXPENSE_CATEGORIES = ['Entrega/Frete', 'Embalagem', 'Marketing', 'Aluguel', 'Taxas e impostos', 'Salários', 'Outros'];

function ExpensesTab({ finance, sales, onAdd, onDelete }) {
  const months = useMemo(() => {
    const set = new Set([...finance.map(f => monthKey(f.date)), ...sales.map(s => monthKey(s.date))]);
    set.add(monthKey(todayISO()));
    return [...set].sort().reverse();
  }, [finance, sales]);
  const [month, setMonth] = useState(monthKey(todayISO()));
  const mk = months.includes(month) ? month : months[0];

  const [form, setForm] = useState({ date: todayISO(), category: EXPENSE_CATEGORIES[0], desc: '', value: '' });

  const submit = (e) => {
    e.preventDefault();
    if (!form.value || !form.desc.trim()) return;
    onAdd({ date: form.date, type: 'saida', category: form.category, desc: form.desc, value: Number(form.value) });
    setForm({ date: todayISO(), category: EXPENSE_CATEGORIES[0], desc: '', value: '' });
  };

  const monthExpenses = finance.filter(f => f.type === 'saida' && monthKey(f.date) === mk);
  const monthSales = sales.filter(s => monthKey(s.date) === mk);
  const revenue = monthSales.reduce((s, x) => s + x.total, 0);
  const cogs = monthSales.reduce((s, x) => s + x.costTotal, 0);
  const totalExpenses = monthExpenses.reduce((s, x) => s + x.value, 0);
  const realProfit = revenue - cogs - totalExpenses;

  const byCategory = useMemo(() => {
    const map = {};
    monthExpenses.forEach(f => { const cat = f.category || 'Outros'; map[cat] = (map[cat] || 0) + f.value; });
    return Object.entries(map).sort(([, a], [, b]) => b - a);
  }, [monthExpenses]);

  return (
    <div>
      <Section title="Saídas — o que realmente sai do caixa" action={
        <select className="fw-input" value={mk} onChange={e => setMonth(e.target.value)}>
          {months.map(m => <option key={m} value={m}>{monthLabel(m)}</option>)}
        </select>
      }>
        <div className="flex flex-wrap gap-4 mb-6">
          <StatCard label="Faturamento bruto (vendas)" value={formatBRL(revenue)} />
          <StatCard label="Custo dos produtos vendidos" value={formatBRL(cogs)} />
          <StatCard label="Saídas registradas" value={formatBRL(totalExpenses)} alert={totalExpenses > 0} />
          <StatCard label="Lucro real do mês" value={formatBRL(realProfit)} alert={realProfit < 0} />
        </div>
        <div className="text-[11px] text-neutral-500 mb-6 fw-mono">
          lucro real = faturamento bruto − custo dos produtos vendidos − saídas registradas (entrega, embalagem, despesas gerais etc.)
        </div>

        <form onSubmit={submit} className="bg-neutral-950 border border-neutral-800 p-4 grid grid-cols-5 gap-3 mb-6">
          <Field label="Data"><input type="date" className="fw-input" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} /></Field>
          <Field label="Categoria">
            <select className="fw-input" value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
              {EXPENSE_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Descrição"><input className="fw-input" value={form.desc} onChange={e => setForm(f => ({ ...f, desc: e.target.value }))} placeholder="Ex: entrega pedido #123" /></Field>
          <Field label="Valor"><input type="number" step="0.01" className="fw-input" value={form.value} onChange={e => setForm(f => ({ ...f, value: e.target.value }))} /></Field>
          <div className="flex items-end"><button className="fw-btn" type="submit"><Plus size={14} />Registrar saída</button></div>
        </form>

        <div className="grid grid-cols-2 gap-6">
          <div className="bg-neutral-950 border border-neutral-800 overflow-x-auto">
            <table className="w-full fw-table">
              <thead><tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>
              <tbody>
                {monthExpenses.length === 0 && <tr><td colSpan={5} className="text-neutral-600 text-center py-6">Nenhuma saída registrada neste mês.</td></tr>}
                {[...monthExpenses].reverse().map(f => (
                  <tr key={f.id}>
                    <td>{f.date}</td>
                    <td>{f.category || '-'}</td>
                    <td>{f.desc}{f.auto && <span className="text-neutral-600 text-[10px] ml-1">(auto)</span>}</td>
                    <td className="text-white">{formatBRL(f.value)}</td>
                    <td>{!f.auto && <button onClick={() => onDelete(f.id)} className="fw-btn-ghost"><Trash2 size={13} /></button>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="bg-neutral-950 border border-neutral-800 p-4">
            <div className="text-sm font-semibold text-neutral-200 mb-3">Saídas por categoria neste mês</div>
            {byCategory.length === 0 ? <div className="text-neutral-600 text-sm">Sem dados ainda.</div> : (
              <table className="w-full fw-table">
                <thead><tr><th>Categoria</th><th>Total</th></tr></thead>
                <tbody>{byCategory.map(([cat, val]) => <tr key={cat}><td>{cat}</td><td>{formatBRL(val)}</td></tr>)}</tbody>
              </table>
            )}
          </div>
        </div>
      </Section>
    </div>
  );
}

// ---------- Orders ----------
const ORDER_STATUS = ['pendente', 'enviado', 'entregue'];
function OrdersTab({ products, clients, orders, onAdd, onUpdateStatus, onDelete }) {
  const [clientId, setClientId] = useState('');
  const [date, setDate] = useState(todayISO());
  const [notes, setNotes] = useState('');
  const [cart, setCart] = useState([]);
  const [pick, setPick] = useState({ productId: '', color: '', size: '', qty: 1 });

  const selectedProduct = products.find(p => p.id === pick.productId);
  const colorsAvail = selectedProduct ? [...new Set(selectedProduct.variants.map(v => v.color))] : [];

  const addToCart = () => {
    if (!selectedProduct || !pick.color || !pick.size || !pick.qty) return;
    setCart(c => [...c, { productId: pick.productId, productName: selectedProduct.name, color: pick.color, size: pick.size, qty: Number(pick.qty) }]);
    setPick({ productId: '', color: '', size: '', qty: 1 });
  };

  const submit = () => {
    if (cart.length === 0) return;
    const client = clients.find(c => c.id === clientId);
    onAdd({ date, clientId: clientId || null, clientName: client ? client.name : 'Consumidor final', items: cart, status: 'pendente', notes });
    setCart([]); setNotes('');
  };

  return (
    <div>
      <Section title="Novo pedido">
        <div className="bg-neutral-950 border border-neutral-800 p-4 mb-4">
          <div className="grid grid-cols-3 gap-3 mb-4">
            <Field label="Data"><input type="date" className="fw-input" value={date} onChange={e => setDate(e.target.value)} /></Field>
            <Field label="Cliente">
              <select className="fw-input" value={clientId} onChange={e => setClientId(e.target.value)}>
                <option value="">Consumidor final</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="Observações"><input className="fw-input" value={notes} onChange={e => setNotes(e.target.value)} /></Field>
          </div>
          <div className="grid grid-cols-5 gap-3 items-end mb-3 border-t border-neutral-800 pt-3">
            <Field label="Produto">
              <select className="fw-input" value={pick.productId} onChange={e => setPick({ productId: e.target.value, color: '', size: '', qty: 1 })}>
                <option value="">Selecione</option>
                {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </Field>
            <Field label="Cor">
              <select className="fw-input" value={pick.color} onChange={e => setPick(p => ({ ...p, color: e.target.value }))} disabled={!selectedProduct}>
                <option value="">Selecione</option>
                {colorsAvail.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
            <Field label="Tamanho">
              <select className="fw-input" value={pick.size} onChange={e => setPick(p => ({ ...p, size: e.target.value }))} disabled={!pick.color}>
                <option value="">Selecione</option>
                {SIZES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Qtd"><input type="number" min="1" className="fw-input" value={pick.qty} onChange={e => setPick(p => ({ ...p, qty: e.target.value }))} /></Field>
            <button onClick={addToCart} className="fw-btn justify-center"><Plus size={14} />Adicionar item</button>
          </div>
          {cart.length > 0 && (
            <div className="border-t border-neutral-800 pt-3">
              <table className="w-full fw-table">
                <thead><tr><th>Produto</th><th>Cor</th><th>Tam.</th><th>Qtd</th></tr></thead>
                <tbody>{cart.map((i, idx) => <tr key={idx}><td>{i.productName}</td><td>{i.color}</td><td>{i.size}</td><td>{i.qty}</td></tr>)}</tbody>
              </table>
              <div className="flex justify-end mt-3"><button onClick={submit} className="fw-btn"><Check size={14} />Criar pedido</button></div>
            </div>
          )}
        </div>
      </Section>

      <Section title="Pedidos">
        <div className="bg-neutral-950 border border-neutral-800 overflow-x-auto">
          <table className="w-full fw-table">
            <thead><tr><th>Data</th><th>Cliente</th><th>Itens</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {orders.length === 0 && <tr><td colSpan={5} className="text-neutral-600 text-center py-6">Nenhum pedido registrado.</td></tr>}
              {[...orders].reverse().map(o => (
                <tr key={o.id}>
                  <td>{o.date}</td><td>{o.clientName}</td>
                  <td>{o.items.map(i => `${i.productName} (${i.color}/${i.size} x${i.qty})`).join(', ')}</td>
                  <td>
                    <select className="fw-input" value={o.status} onChange={e => onUpdateStatus(o.id, e.target.value)}
                      style={{ color: '#ffffff', fontWeight: o.status === 'pendente' ? 700 : 400, fontStyle: o.status === 'enviado' ? 'italic' : 'normal', textDecoration: o.status === 'pendente' ? 'underline' : 'none' }}>
                      {ORDER_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </td>
                  <td><button onClick={() => onDelete(o.id)} className="fw-btn-ghost"><Trash2 size={13} /></button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Section>
    </div>
  );
}

// ---------- Reports ----------
function ReportsTab({ sales, purchases, finance, products }) {
  const months = useMemo(() => {
    const set = new Set([...sales.map(s => monthKey(s.date)), ...purchases.map(p => monthKey(p.date)), ...finance.map(f => monthKey(f.date))]);
    return [...set].sort().reverse();
  }, [sales, purchases, finance]);
  const [selected, setSelected] = useState(months[0] || thisMk());
  function thisMk() { return monthKey(todayISO()); }
  const mk = months.includes(selected) ? selected : (months[0] || thisMk());

  const monthSales = sales.filter(s => monthKey(s.date) === mk);
  const monthPurchases = purchases.filter(p => monthKey(p.date) === mk);
  const monthExpenses = finance.filter(f => monthKey(f.date) === mk && f.type === 'saida' && !f.auto);
  const revenue = monthSales.reduce((s, x) => s + x.total, 0);
  const cost = monthSales.reduce((s, x) => s + x.costTotal, 0);
  const expenses = monthExpenses.reduce((s, x) => s + x.value, 0);
  const purchaseTotal = monthPurchases.reduce((s, x) => s + x.total, 0);
  const netProfit = revenue - cost - expenses;

  const topProducts = useMemo(() => {
    const map = {};
    monthSales.forEach(s => s.items.forEach(i => { map[i.productName] = (map[i.productName] || 0) + i.qty; }));
    return Object.entries(map).sort(([, a], [, b]) => b - a).slice(0, 5);
  }, [monthSales]);

  return (
    <div>
      <Section title="Relatório mensal" action={
        <select className="fw-input" value={mk} onChange={e => setSelected(e.target.value)}>
          {months.length === 0 && <option value={thisMk()}>{monthLabel(thisMk())}</option>}
          {months.map(m => <option key={m} value={m}>{monthLabel(m)}</option>)}
        </select>
      }>
        <div className="flex flex-wrap gap-4 mb-6">
          <StatCard label="Receita de vendas" value={formatBRL(revenue)} />
          <StatCard label="Custo dos produtos vendidos" value={formatBRL(cost)} tone="neutral" />
          <StatCard label="Compras de fornecedores" value={formatBRL(purchaseTotal)} tone="neutral" />
          <StatCard label="Despesas" value={formatBRL(expenses)} />
          <StatCard label="Lucro líquido" value={formatBRL(netProfit)} alert={netProfit < 0} />
        </div>

        <div className="bg-neutral-950 border border-neutral-800 p-4">
          <div className="text-sm font-semibold text-neutral-200 mb-3">Produtos mais vendidos no mês</div>
          {topProducts.length === 0 ? <div className="text-neutral-600 text-sm">Sem vendas neste mês.</div> : (
            <table className="w-full fw-table">
              <thead><tr><th>Produto</th><th>Unidades vendidas</th></tr></thead>
              <tbody>{topProducts.map(([name, qty]) => <tr key={name}><td>{name}</td><td>{qty}</td></tr>)}</tbody>
            </table>
          )}
        </div>
      </Section>
    </div>
  );
}

      <div className="w-full max-w-lg bg-neutral-950 border border-white p-6">
        <img src={LOGO_DATA_URI} alt="movia." className="h-7 w-auto mb-6" />

const SUPABASE_ANON_KEY = 'COLE_AQUI_SUA_SUPABASE_ANON_KEY';`}</pre>

function LoginScreen({ sb }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [info, setInfo] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setInfo(''); setLoading(true);
    try {
      if (mode === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        setInfo('Conta criada! Se a confirmação por e-mail estiver ativa no seu projeto, confira sua caixa de entrada antes de entrar.');
      }
    } catch (e) {
      setError(e.message || 'Algo deu errado. Tente novamente.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen bg-black flex items-center justify-center fw-body px-4">
      <Fonts />
      <div className="w-full max-w-sm">
        <img src={LOGO_DATA_URI} alt="movia." className="h-8 w-auto mx-auto mb-8" />
        <form onSubmit={submit} className="bg-neutral-950 border border-neutral-800 p-6 flex flex-col gap-3">
          <div className="flex mb-2 border border-neutral-800 rounded overflow-hidden">
            <button type="button" onClick={() => setMode('login')}
              className={`flex-1 py-2 text-xs font-semibold ${mode === 'login' ? 'bg-white text-black' : 'text-neutral-500'}`}>Entrar</button>
            <button type="button" onClick={() => setMode('signup')}
              className={`flex-1 py-2 text-xs font-semibold ${mode === 'signup' ? 'bg-white text-black' : 'text-neutral-500'}`}>Criar conta</button>
          </div>
          <Field label="E-mail">
            <input type="email" required className="fw-input" value={email} onChange={e => setEmail(e.target.value)} placeholder="voce@email.com" />
          </Field>
          <Field label="Senha">
            <input type="password" required minLength={6} className="fw-input" value={password} onChange={e => setPassword(e.target.value)} placeholder="mínimo 6 caracteres" />
          </Field>
          {error && <div className="text-[12px] text-white bg-neutral-900 border border-white p-2">{error}</div>}
          {info && <div className="text-[12px] text-neutral-300 bg-neutral-900 border border-neutral-700 p-2">{info}</div>}
          <button type="submit" disabled={loading} className="fw-btn justify-center mt-1">
            {loading ? 'aguarde...' : mode === 'login' ? 'Entrar' : 'Criar conta'}
          </button>
        </form>
        <div className="text-center text-[11px] text-neutral-600 mt-4 fw-mono">
          seus dados ficam privados, vinculados só a este login
        </div>
      </div>
    </div>
  );
}

function AuthGate({ sb }) {
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((_event, newSession) => {
      setSession(newSession);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return (
      <div className="min-h-screen bg-black text-neutral-500 flex items-center justify-center fw-mono text-sm">
        verificando login...
      </div>
    );
  }

  if (!session) {
    return <LoginScreen sb={sb} />;
  }

  return <App sb={sb} session={session} onSignOut={() => sb.auth.signOut()} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(CONFIG_OK ? <AuthGate sb={sb} /> : <ConfigNeeded />);
</script>
